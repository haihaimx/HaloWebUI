name: Build and Push Docker Image to Tencent Cloud CCR

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  REGISTRY: ccr.ccs.tencentyun.com
  IMAGE_NAME: halowebui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成时间戳标签
        id: meta
        run: |
          BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')
          FULL_IMAGE="${REGISTRY}/openwebui/${IMAGE_NAME}"
          TAG="${FULL_IMAGE}:${BUILD_TIME}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

          echo "镜像: ${TAG}"

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录腾讯云 CCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}

      - name: 缓存 Docker 层
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          build-args: |
            INSTALL_PROFILE=core
            PRELOAD_LOCAL_MODELS=false
            ENABLE_PYODIDE=false
            VITE_SOURCEMAP=false
            HALO_RUNTIME_PROFILE=main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: 移动缓存
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

      - name: 构建摘要
        if: success()
        run: |
          echo "## 构建成功" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 时间: \`${{ steps.meta.outputs.build_time }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
